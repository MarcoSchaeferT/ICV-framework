name: Docker Image CI ICV

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v5
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR 
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 1. Build and push Database image
    - name: Build and push icv-database
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./db/Dockerfile.db
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/marcoschaefert/icv-database:latest
        build-args: |
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD_SECRET }}

    # 2. Build and push Backend image
    - name: Build and push icv-backend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./backend/Dockerfile.backend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/marcoschaefert/icv-backend:latest
        build-args: |
          DATABASE_URL=${{ secrets.DATABASE_URL_SECRET }}

    # 3. Build and push Frontend image
    - name: Build and push icv-frontend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.frontend
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ghcr.io/marcoschaefert/icv-frontend:latest