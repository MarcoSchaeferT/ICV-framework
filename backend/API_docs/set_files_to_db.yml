tags:
  - REST Endpoints
summary: Upload CSV files to database
description: Uploads one or more CSV files to the database, creating new tables or updating existing ones. The files are saved and the endpoint returns immediately with an upload_id; parsing and insertion continue in the background. Poll /api/uploadStatus?id=<upload_id> for progress and errors.
consumes:
  - multipart/form-data
parameters:
  - name: files
    in: formData
    description: One or more CSV files to upload to the database. Files are temporarily saved before being processed and inserted into the database.
    required: true
    type: file
    collectionFormat: multi
responses:
  200:
    description: Files saved, background processing started
    content:
      application/json:
        schema:
          type: object
          properties:
            SUCCESS:
              type: string
              example: "Files upload started"
            upload_id:
              type: string
              description: ID to poll via /api/uploadStatus for progress and errors.
              example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
            file_paths:
              type: array
              items:
                type: string
              description: List of file paths where the files were saved.
              example: ["/backend/assets/uploads_tmp/mosquito_data.csv"]
            table_exist:
              type: boolean
              description: Whether a table for the uploaded file already existed (upload updates it instead of creating it).
              example: false
  400:
    description: Bad request - no files provided or invalid request
    content:
      application/json:
        schema:
          type: object
          properties:
            ERROR:
              type: string
              description: Error message.
          examples:
            no_files_part:
              value:
                ERROR: "No files part in the request"
            no_selected_files:
              value:
                ERROR: "No selected files"
            no_files_saved:
              value:
                ERROR: "No files were saved"
  500:
    description: Internal server error during file processing or database insertion
    content:
      application/json:
        schema:
          type: object
          properties:
            ERROR:
              type: string
              description: Detailed error message.
              example: "Error saving file: Permission denied"
