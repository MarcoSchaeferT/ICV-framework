tags:
  - Map Data Endpoints
summary: Get world map GeoJSON data
description: Returns GeoJSON data for world map at low resolution.
responses:
  200:
    description: Successful response with GeoJSON data
    content:
      application/json:
        schema:
          type: object
          description: GeoJSON FeatureCollection with world map data
          example:
            type: "FeatureCollection"
            features: []
  500:
    description: Internal server error reading map data
    content:
      application/json:
        schema:
          type: object
          properties:
            ERROR:
              type: string
              description: Error message
              example: "ERROR reading CSV file: get_world_map"
