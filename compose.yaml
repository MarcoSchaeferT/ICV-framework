services:

  icv-database:
    image: ghcr.io/marcoschaefert/icv-database:latest
    restart: always
    build:
      context: .
      dockerfile: ./db/Dockerfile.db
      network: host
    ports:
      - "5333:5333"
    environment:
      POSTGRES_DB: icv-database
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD_SECRET}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal-network

  icv-redis:
    image: redis:7-alpine
    restart: always
    container_name: icv-redis
    # Holds transient upload progress/error state shared across the Gunicorn
    # workers of icv-backend — no persistence needed.
    command: [ "redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru" ]
    networks:
      - internal-network

  icv-frontend:
    image: ghcr.io/marcoschaefert/icv-frontend:latest
    environment:
      IS_DOCKER: "true"
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE}
      NEXT_PUBLIC_SHOW_DISCLAIMER: ${NEXT_PUBLIC_SHOW_DISCLAIMER}
      NEXT_PUBLIC_SHOW_COV: ${NEXT_PUBLIC_SHOW_COV}
    build:
      context: .
      dockerfile: ./Dockerfile.frontend
      network: host
    container_name: icv-frontend
    ports:
      - "3000:3000"
    networks:
      - internal-network
    # Local dev only: maps icv-database to host machine. Not needed for Kubernetes.
    extra_hosts:
      - "icv-database:host-gateway"

  icv-backend:
    image: ghcr.io/marcoschaefert/icv-backend:latest
    build:
      context: .
      dockerfile: ./backend/Dockerfile.backend
      network: host
    container_name: icv-backend
    # Local dev only: maps icv-database to host machine. Not needed for Kubernetes.
    extra_hosts:
      - "icv-database:host-gateway"
    ports:
      - "5222:5222"
    networks:
      - internal-network
    depends_on:
      - icv-database
      - icv-redis
    environment:
      DATABASE_URL: "postgresql://${DATABASE_USER}:${DB_PASSWORD_SECRET}@icv-database:5333/icv-database"
      # Shared state for upload progress/errors across Gunicorn workers
      REDIS_URL: "redis://icv-redis:6379/0"
      IS_DOCKER: "true"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-}

volumes:
  db-data:

networks:
  internal-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
