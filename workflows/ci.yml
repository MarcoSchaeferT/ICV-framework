name: Docker Image CI davis

on:
  push:
    branches: [ "master", "metadata_editor" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build-and-push:

    runs-on: ${{matrix.os}}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        os: [ubuntu-latest]

    

    steps:
    - uses: actions/checkout@v5
    
    - name: Install dependencies
      run: npm install

    - name: Log in to GHCR 
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and Push the Docker Images
      env:
        POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD_SECRET }}
        DATABASE_URL: ${{ secrets.DATABASE_URL_SECRET }}
      run: |
        docker compose build --no-cache \
          --build-arg POSTGRES_PASSWORD=$POSTGRES_PASSWORD \
          --build-arg DATABASE_URL=$DATABASE_URL
        docker push ghcr.io/marcoschaefert/icv-database:latest
        docker push ghcr.io/marcoschaefert/icv-backend:latest
        docker push ghcr.io/marcoschaefert/icv-frontend:latest